<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus E-Commerce</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to polyfill fetch in an environment where it's read-only.
      (function() {
        try {
          if (window.fetch && Object.getOwnPropertyDescriptor(window, 'fetch')?.writable === false) {
            const nativeFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: nativeFetch,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          // Ignore errors during redefinition
        }
      })();
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=%VITE_RECAPTCHA_SITE_KEY%"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
